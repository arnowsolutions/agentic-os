<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OmniRoute Chat</title>
<style>
:root {
  --bg: #0f0f1e;
  --bg-card: #1a1a2e;
  --border: #2a2a4a;
  --text: #ffffff;
  --text-muted: #a0a0c0;
  --accent: #667eea;
  --green: #27c93f;
  --red: #ff5f56;
  --yellow: #f0a040;
  --radius: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
}

.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.header h1 { font-size: 16px; font-weight: 600; }
.header select {
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 5px 10px;
  font-size: 12px;
}
.status { font-size: 12px; display: flex; align-items: center; gap: 6px; }
.dot { width: 8px; height: 8px; border-radius: 50%; }
.dot.online { background: var(--green); }
.dot.offline { background: var(--red); }
.dot.checking { background: var(--yellow); animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

.messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  min-height: 0;
}
.msg { display: flex; gap: 10px; animation: fadeIn .2s ease; }
.msg.user { flex-direction: row-reverse; }
.msg .avatar {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.msg.assistant .avatar { background: linear-gradient(135deg, #667eea, #764ba2); }
.msg.user .avatar { background: linear-gradient(135deg, #f093fb, #f5576c); }
.msg .bubble {
  max-width: 75%; padding: 10px 14px; border-radius: 16px;
  font-size: 14px; line-height: 1.55; word-wrap: break-word;
}
.msg.user .bubble { background: var(--accent); border-bottom-right-radius: 4px; }
.msg.assistant .bubble { background: var(--bg-card); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
.msg .bubble img { max-width: 100%; max-height: 300px; border-radius: 8px; margin: 6px 0; }
.msg .bubble pre {
  background: rgba(0,0,0,.3); border-radius: 8px; padding: 10px;
  overflow-x: auto; font-size: 13px; margin: 8px 0;
}
.msg .bubble code {
  font-family: 'SF Mono', Monaco, monospace; font-size: 13px;
  background: rgba(0,0,0,.2); padding: 2px 5px; border-radius: 4px;
}
.msg .bubble pre code { background: none; padding: 0; }
.msg .meta {
  font-size: 11px; color: var(--text-muted); margin-top: 2px;
  padding: 0 54px;
}
.msg.user + .meta { text-align: right; padding: 0 14px; }
.cursor { animation: blink 1s step-end infinite; color: var(--accent); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } }

.empty { text-align: center; color: var(--text-muted); padding: 40px 20px; margin: auto; }
.empty .icon { font-size: 48px; margin-bottom: 12px; }
.empty h2 { font-size: 18px; margin-bottom: 6px; }
.empty p { font-size: 13px; line-height: 1.6; }

.input-area {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  background: var(--bg-card);
  flex-shrink: 0;
}
.input-row { display: flex; gap: 8px; align-items: flex-end; }
.upload-btn {
  background: var(--bg); color: var(--text); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 12px; cursor: pointer; font-size: 18px;
  flex-shrink: 0; line-height: 1;
}
.upload-btn:hover { border-color: var(--accent); }
textarea {
  flex: 1; resize: none; max-height: 150px; min-height: 44px;
  background: var(--bg); color: var(--text); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 14px; font-size: 14px; font-family: inherit;
  line-height: 1.5;
}
textarea:focus { outline: none; border-color: var(--accent); }
.send-btn {
  background: var(--accent); color: #fff; border: none;
  border-radius: 8px; padding: 10px 20px; cursor: pointer;
  font-size: 14px; font-weight: 600; flex-shrink: 0;
}
.send-btn:disabled { opacity: .5; cursor: not-allowed; }
.send-btn:hover:not(:disabled) { filter: brightness(1.1); }

.img-previews { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
.img-preview { position: relative; display: inline-block; }
.img-preview img { width: 80px; height: 60px; border-radius: 6px; border: 1px solid var(--border); object-fit: cover; }
.img-preview .remove {
  position: absolute; top: -6px; right: -6px; width: 20px; height: 20px;
  border-radius: 50%; background: var(--red); color: #fff; border: none;
  cursor: pointer; font-size: 11px; display: flex; align-items: center; justify-content: center;
}
</style>
</head>
<body>

<div class="header">
  <h1>💬 OmniRoute Chat</h1>
  <div style="display:flex;align-items:center;gap:12px">
    <select id="modelSelect">
      <optgroup label="Auto Routing">
        <option value="auto/cheap">💰 auto/cheap</option>
        <option value="auto/best-free">🆓 auto/best-free</option>
        <option value="auto/coding:free">💻 auto/coding:free</option>
        <option value="auto/best-coding">🏆 auto/best-coding</option>
        <option value="auto/best-fast">⚡ auto/best-fast</option>
        <option value="auto/best-reasoning">🧠 auto/best-reasoning</option>
        <option value="auto/coding" selected>🔧 auto/coding</option>
        <option value="auto/chat">💬 auto/chat</option>
      </optgroup>
      <optgroup label="Direct Models">
        <option value="groq/llama-3.3-70b-versatile">Groq Llama 3.3 70B</option>
        <option value="groq/meta-llama/llama-4-scout-17b-16e-instruct">Groq Llama 4 Scout 17B</option>
        <option value="groq/qwen/qwen3.6-27b">Groq Qwen 3.6 27B</option>
        <option value="groq/llama-3.1-8b-instant">Groq Llama 3.1 8B</option>
      </optgroup>
    </select>
    <span class="status"><span class="dot checking" id="statusDot"></span><span id="statusText">checking</span></span>
    <button onclick="newChat()" style="background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:5px 10px;cursor:pointer;font-size:12px">🆕 New</button>
  </div>
</div>

<div class="messages" id="messages">
  <div class="empty">
    <div class="icon">🚀</div>
    <h2>OmniRoute Chat</h2>
    <p>237 providers · auto-fallback · free routing<br>Paste images with Ctrl+V or click 🖼️ to upload</p>
  </div>
</div>

<div class="input-area">
  <div class="img-previews" id="imgPreviews"></div>
  <div class="input-row">
    <label class="upload-btn" title="Upload image">🖼️<input type="file" accept="image/*" multiple style="display:none" id="fileInput"></label>
    <textarea id="input" rows="1" placeholder="Type a message... (Enter to send, Shift+Enter for new line)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="send()">▶ Send</button>
  </div>
</div>

<script>
const BASE = 'https://omniroute.srv1738752.hstgr.cloud';
const KEY = 'omni-0901b5a1277093ee297bdcf3742c00ce92cf6461540e445d';

let messages = [];
let pendingImages = [];
let isStreaming = false;

// ── Init ──
document.getElementById('fileInput').addEventListener('change', handleFiles);
document.getElementById('input').addEventListener('paste', handlePaste);
document.getElementById('input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey && !isStreaming) { e.preventDefault(); send(); }
});
document.getElementById('input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 150) + 'px';
});

async function checkHealth() {
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  try {
    const r = await fetch(BASE + '/v1/models', { headers: { Authorization: 'Bearer ' + KEY }, signal: AbortSignal.timeout(5000) });
    if (r.ok) {
      dot.className = 'dot online';
      text.textContent = 'online';
    } else throw new Error('HTTP ' + r.status);
  } catch(e) {
    dot.className = 'dot offline';
    text.textContent = 'offline';
  }
}
checkHealth();
setInterval(checkHealth, 30000);

// ── Images ──
function handleFiles(e) {
  for (const f of e.target.files) {
    if (!f.type.startsWith('image/')) continue;
    const reader = new FileReader();
    reader.onload = ev => { pendingImages.push(ev.target.result); renderImgPreviews(); };
    reader.readAsDataURL(f);
  }
  e.target.value = '';
}

async function handlePaste(e) {
  const items = e.clipboardData?.items;
  if (!items) return;
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      e.preventDefault();
      const blob = item.getAsFile();
      const reader = new FileReader();
      reader.onload = ev => { pendingImages.push(ev.target.result); renderImgPreviews(); };
      reader.readAsDataURL(blob);
      return;
    }
  }
}

function renderImgPreviews() {
  const el = document.getElementById('imgPreviews');
  if (pendingImages.length === 0) { el.innerHTML = ''; return; }
  el.innerHTML = pendingImages.map((img, i) =>
    `<div class="img-preview"><img src="${img}"><button class="remove" onclick="pendingImages.splice(${i},1);renderImgPreviews()">✕</button></div>`
  ).join('');
}

// ── Send ──
async function send() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text && pendingImages.length === 0) return;
  if (isStreaming) return;

  isStreaming = true;
  document.getElementById('sendBtn').disabled = true;

  const userMsg = { role: 'user', content: text || '(image)', images: [...pendingImages], time: Date.now() };
  messages.push(userMsg);

  input.value = '';
  input.style.height = 'auto';
  const sentImages = [...pendingImages];
  pendingImages = [];
  renderImgPreviews();

  // Streaming placeholder
  const aiMsg = { role: 'assistant', content: '', model: '', tokens: 0, time: Date.now(), streaming: true };
  messages.push(aiMsg);
  const idx = messages.length - 1;
  render();

  const model = document.getElementById('modelSelect').value;
  const apiMsgs = buildPayload(text || 'Analyze this image:', sentImages);

  try {
    const resp = await fetch(BASE + '/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + KEY },
      body: JSON.stringify({ model, messages: apiMsgs, max_tokens: 4096 }),
      signal: AbortSignal.timeout(120000)
    });

    if (!resp.ok) {
      const errText = await resp.text().catch(() => 'Unknown');
      throw new Error('HTTP ' + resp.status + ': ' + errText.slice(0, 200));
    }

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '', content = '', resolvedModel = model, tokens = 0;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const d = line.slice(6).trim();
        if (d === '[DONE]') continue;
        try {
          const chunk = JSON.parse(d);
          if (chunk.choices?.[0]?.delta?.content) {
            content += chunk.choices[0].delta.content;
            messages[idx].content = content;
            messages[idx].model = chunk.model || resolvedModel;
            updateStreamingBubble(idx);
          }
          if (chunk.usage) { tokens = chunk.usage.total_tokens; resolvedModel = chunk.model || resolvedModel; }
        } catch(e) {}
      }
    }

    messages[idx].content = content || '(empty)';
    messages[idx].model = resolvedModel;
    messages[idx].tokens = tokens;
    messages[idx].time = Date.now();
    delete messages[idx].streaming;
    render();
  } catch(e) {
    messages[idx].content = e.name === 'AbortError' ? '⏰ Timeout' : '❌ ' + e.message;
    messages[idx].isError = true;
    delete messages[idx].streaming;
    render();
  } finally {
    isStreaming = false;
    document.getElementById('sendBtn').disabled = false;
  }
}

function buildPayload(text, images) {
  const ctx = messages.slice(-20).filter(m => m.role !== 'system' && !m.isError);
  const out = [];
  for (const m of ctx) {
    if (m.images?.length) {
      const parts = [{ type: 'text', text: m.content || 'Analyze this image:' }];
      for (const img of m.images) parts.push({ type: 'image_url', image_url: { url: img } });
      out.push({ role: 'user', content: parts });
    } else {
      out.push({ role: m.role, content: m.content });
    }
  }
  return out;
}

// ── Render ──
function render() {
  const el = document.getElementById('messages');
  if (messages.length === 0) {
    el.innerHTML = `<div class="empty"><div class="icon">🚀</div><h2>OmniRoute Chat</h2><p>237 providers · auto-fallback · free routing<br>Paste images with Ctrl+V or click 🖼️ to upload</p></div>`;
    return;
  }
  el.innerHTML = messages.map((m, i) => {
    const isUser = m.role === 'user';
    const avatar = isUser ? '👤' : '🤖';
    const cls = m.isError ? 'msg assistant' : `msg ${m.role}`;
    const bubbleStyle = m.isError ? 'style="background:#2a0a0a;border-color:var(--red);color:#fca5a5"' : '';

    let body = '';
    if (m.images?.length) body += m.images.map(img => `<img src="${img}" loading="lazy">`).join('');
    if (m.content && m.content !== '(image)') {
      body += escapeHtml(m.content);
      if (m.streaming) body += '<span class="cursor">▊</span>';
    } else if (m.streaming) {
      body += '<span class="cursor">▊</span>';
    }

    let html = `<div class="${cls}" data-idx="${i}"><div class="avatar">${avatar}</div><div class="bubble" ${bubbleStyle}>${body}</div></div>`;
    if (!isUser && !m.isError && !m.streaming && (m.model || m.tokens)) {
      html += `<div class="meta">${m.model ? `<b>${escapeHtml(m.model)}</b>` : ''}${m.tokens ? ` · ${m.tokens} tokens` : ''}</div>`;
    } else if (m.streaming) {
      html += `<div class="meta" style="color:var(--yellow)">streaming...</div>`;
    }
    return html;
  }).join('');
  el.scrollTop = el.scrollHeight;
}

function updateStreamingBubble(idx) {
  const el = document.querySelector(`[data-idx="${idx}"] .bubble`);
  if (!el) { render(); return; }
  el.innerHTML = escapeHtml(messages[idx].content) + '<span class="cursor">▊</span>';
  document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
}

function newChat() {
  messages = [];
  pendingImages = [];
  render();
  renderImgPreviews();
}

function escapeHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
