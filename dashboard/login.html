<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentic OS — Sign In</title>
    <style>
        .login-body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #e0e0e0;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 40px 36px;
            width: 100%;
            max-width: 400px;
            backdrop-filter: blur(12px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        .login-logo {
            text-align: center;
            font-size: 40px;
            margin-bottom: 8px;
        }
        .login-title {
            text-align: center;
            font-size: 20px;
            font-weight: 600;
            color: #6c5ce7;
            margin-bottom: 4px;
        }
        .login-subtitle {
            text-align: center;
            font-size: 13px;
            color: #888;
            margin-bottom: 28px;
        }
        .login-card label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #bbb;
            margin-bottom: 6px;
            margin-top: 16px;
        }
        .login-card input {
            width: 100%;
            padding: 12px 14px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }
        .login-card input:focus {
            border-color: #6c5ce7;
            box-shadow: 0 0 0 2px rgba(108, 92, 231, 0.2);
        }
        .login-card input::placeholder {
            color: #666;
        }
        .login-card button {
            width: 100%;
            padding: 13px;
            margin-top: 24px;
            background: linear-gradient(135deg, #6c5ce7 0%, #a855f7 100%);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
        }
        .login-card button:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(108, 92, 231, 0.3);
        }
        .login-card button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .error-msg {
            display: none;
            margin-top: 14px;
            padding: 10px 14px;
            background: rgba(255, 71, 87, 0.15);
            border: 1px solid rgba(255, 71, 87, 0.3);
            border-radius: 6px;
            color: #ff6b81;
            font-size: 13px;
            text-align: center;
        }
        .error-msg.visible {
            display: block;
        }
        .login-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #666;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.2);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
    </style>
</head>
<body class="login-body">
    <div class="login-card">
        <div class="login-logo">🏥</div>
        <div class="login-title">Urology Department Portal</div>
        <div class="login-subtitle">Sign in with your Montefiore account</div>

        <form id="loginForm" autocomplete="on">
            <label for="emailInput">Email (@montefiore.org)</label>
            <input
                type="email"
                id="emailInput"
                autocomplete="username"
                placeholder="you@montefiore.org"
                required
            >

            <label for="passwordInput">Password</label>
            <input
                type="password"
                id="passwordInput"
                autocomplete="current-password"
                placeholder="Enter your password"
                required
            >

            <div id="loginError" class="error-msg"></div>

            <button type="submit" id="loginBtn">
                Sign In
            </button>
        </form>

        <div class="login-footer">
            Agentic OS &mdash; Montefiore Urology
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const emailInput = document.getElementById('emailInput');
        const passwordInput = document.getElementById('passwordInput');
        const loginBtn = document.getElementById('loginBtn');
        const errorDiv = document.getElementById('loginError');

        function showError(msg) {
            errorDiv.textContent = msg;
            errorDiv.classList.add('visible');
        }

        function hideError() {
            errorDiv.classList.remove('visible');
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();

            const email = emailInput.value.trim();
            const password = passwordInput.value;

            if (!email || !password) {
                showError('Please enter your email and password.');
                return;
            }

            // Disable button during request
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="spinner"></span>Signing in...';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, redirect: '/' }),
                });

                const data = await res.json().catch(() => ({}));

                if (res.ok) {
                    // Success — redirect
                    if (data.must_reset) {
                        window.location = '/#change-password';
                    } else {
                        window.location = '/';
                    }
                } else {
                    showError(data.detail || 'Login failed. Please try again.');
                }
            } catch (err) {
                showError('Network error. Please check your connection and try again.');
            } finally {
                if (!errorDiv.classList.contains('visible')) {
                    // No error — we're redirecting, leave button disabled
                } else {
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Sign In';
                }
            }
        });

        // Focus email on load
        emailInput.focus();
    </script>
</body>
</html>
