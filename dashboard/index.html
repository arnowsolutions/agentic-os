<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agentic OS</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<link rel="stylesheet" href="styles.css">
<script async src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
  <button class="mobile-menu-btn" onclick="toggleMobileMenu()" title="Menu" style="display:none">☰</button>
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleMobileMenu()"></div>
  <div id="topLoadingBar"></div>
  <nav id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <div class="logo" onclick="navigate('dashboard')" style="cursor:pointer" title="Go to Dashboard">
        <svg class="logo-svg" viewBox="0 0 36 36" width="36" height="36">
          <defs><linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#6c5ce7"/><stop offset="100%" stop-color="#fd79a8"/></linearGradient></defs>
          <rect x="2" y="2" width="32" height="32" rx="10" fill="url(#lg)" opacity="0.15"/>
          <rect x="4" y="4" width="28" height="28" rx="8" fill="none" stroke="url(#lg)" stroke-width="1.5"/>
          <polygon points="18,8 26,13 26,23 18,28 10,23 10,13" fill="none" stroke="url(#lg)" stroke-width="2" stroke-linejoin="round"/>
          <circle cx="18" cy="18" r="4" fill="url(#lg)"/>
        </svg>
        <span class="logo-text">Agentic OS</span>
      </div>
      <button class="sidebar-toggle" onclick="toggleSidebar()" title="Toggle sidebar">
        <svg viewBox="0 0 24 24" width="18" height="18" class="toggle-icon">
          <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
    <div class="sidebar-nav" id="sidebarNav"></div>
    <div class="sidebar-footer">
      <div class="agent-status-bar" id="agentStatusBar">
        <div class="agent-dot offline"></div>
        <span class="agent-status-text">Connecting...</span>
      </div>
      <button class="theme-btn" onclick="toggleTheme()" title="Toggle theme"><span class="theme-label">🌓</span></button>
    </div>
  </nav>

  <main class="main-content">
    <div class="topbar">
      <div class="topbar-left">
        <span class="topbar-title" id="pageTitle">Dashboard</span>
        <span class="topbar-breadcrumb" id="pageBreadcrumb">Overview</span>
      </div>
      <div class="topbar-right">
        <div id="healthWidget" class="health-widget" style="display:flex;align-items:center;gap:10px;margin-right:12px;font-size:12px"></div>
        <div class="topbar-search">
          <span>🔍</span>
          <input type="text" placeholder="Search pages…" id="globalSearch" oninput="handleGlobalSearch(this.value)" onkeydown="handleGlobalSearchKeydown(event)" autocomplete="off">
          <div id="searchResults" class="search-results"></div>
        </div>
      </div>
    </div>
    <div id="pageContent" class="page-content">
      <div class="loading"><div class="loading-spinner"></div><span>Loading Agentic OS...</span></div>
    </div>
  </main>

  <div id="toastContainer" class="toast-container"></div>
  <div id="modalContainer"></div>

  <script src="utils.js"></script>
  <script src="api.js"></script>
  <script src="app.js"></script>
</body>
</html>
