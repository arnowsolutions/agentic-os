<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎬 Video Prompt Builder</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { 
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f0f0f; color: #e0e0e0; min-height: 100vh;
  }
  .header {
    background: linear-gradient(135deg, #1a1a2e, #3a1a2e);
    padding: 20px 40px;
    border-bottom: 1px solid #333;
    display: flex; justify-content: space-between; align-items: center;
  }
  .header h1 { font-size: 24px; color: #fff; }
  .header span { color: #888; font-size: 14px; }
  
  .section {
    padding: 24px 40px;
    border-bottom: 1px solid #222;
  }
  .section-title {
    font-size: 18px; font-weight: 600; color: #bbb;
    margin-bottom: 16px; text-transform: uppercase; letter-spacing: 1px;
  }
  .section-desc { color: #666; font-size: 13px; margin-bottom: 12px; }
  
  .grid {
    display: flex; gap: 16px; overflow-x: auto; padding-bottom: 12px;
  }
  .card {
    min-width: 200px; max-width: 240px;
    background: #1a1a1a; border-radius: 12px; overflow: hidden;
    border: 2px solid transparent; cursor: pointer;
    transition: all 0.2s; flex-shrink: 0;
  }
  .card:hover { border-color: #555; transform: translateY(-2px); }
  .card.selected { border-color: #ff6b6b; box-shadow: 0 0 20px rgba(255,107,107,0.3); }
  .card img { width: 100%; height: 140px; object-fit: cover; display: block; background: #222; }
  .card .label { padding: 10px 12px 4px; font-size: 13px; font-weight: 500; color: #ccc; }
  .card .desc { padding: 0 12px 10px; font-size: 11px; color: #777; }
  
  .theme-card {
    min-width: 180px; max-width: 220px;
    background: linear-gradient(135deg, #1e1e2e, #2a1a2e);
    border-radius: 12px; padding: 16px;
    border: 2px solid transparent; cursor: pointer;
    transition: all 0.2s; flex-shrink: 0;
  }
  .theme-card:hover { border-color: #555; transform: translateY(-2px); }
  .theme-card.selected { border-color: #ff6b6b; box-shadow: 0 0 20px rgba(255,107,107,0.3); }
  .theme-card .emoji { font-size: 32px; margin-bottom: 8px; }
  .theme-card .name { font-size: 14px; font-weight: 600; color: #e0e0e0; margin-bottom: 4px; }
  .theme-card .desc { font-size: 11px; color: #888; line-height: 1.4; }
  .theme-card .tags { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 4px; }
  .theme-card .tag { font-size: 10px; padding: 2px 8px; border-radius: 10px; background: rgba(255,255,255,0.1); color: #999; }
  
  .prompt-area {
    background: #2a1a2e; padding: 24px 40px;
    position: sticky; bottom: 0;
    border-top: 1px solid #333;
  }
  .prompt-box {
    background: #111; border: 1px solid #333; border-radius: 8px;
    padding: 16px; min-height: 100px; font-size: 14px; line-height: 1.5;
    color: #ccc; margin-bottom: 12px;
  }
  .prompt-box .hl { color: #4a9eff; }
  .prompt-box .hl2 { color: #ff6b6b; }
  .prompt-box .hl3 { color: #ffd93d; }
  .prompt-box .hl4 { color: #6bcb77; }
  
  .btn-row { display: flex; gap: 12px; flex-wrap: wrap; }
  .btn {
    padding: 12px 32px; border: none; border-radius: 8px;
    font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s;
  }
  .btn-primary { background: #ff6b6b; color: #fff; }
  .btn-primary:hover { background: #ee5b5b; }
  .btn-secondary { background: #333; color: #ccc; }
  .btn-secondary:hover { background: #444; }
  
  .subject-input {
    background: #111; border: 1px solid #333; border-radius: 8px;
    padding: 12px 16px; width: 100%; font-size: 14px; color: #e0e0e0;
    margin-bottom: 12px;
  }
  .subject-input:focus { outline: none; border-color: #ff6b6b; }
  
  .param-row { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 12px; }
  .param-group { display: flex; flex-direction: column; gap: 4px; }
  .param-group label { font-size: 12px; color: #888; }
  .param-group select, .param-group input {
    background: #111; border: 1px solid #333; border-radius: 6px;
    padding: 8px 12px; color: #e0e0e0; font-size: 13px;
  }
</style>
</head>
<body>

<div class="header">
  <h1>🎬 Video Prompt Builder</h1>
  <span>Based on Google Veo 3.1 official guide</span>
</div>

<div class="section">
  <div class="section-title">🎥 What are we filming?</div>
  <input class="subject-input" id="subject" placeholder="Describe the scene..." value="a scene or action">
</div>

<!-- THEMES -->
<div class="section" style="background: linear-gradient(135deg, #0f0f1a, #2a0f1a);">
  <div class="section-title">🎯 Video Themes</div>
  <div class="section-desc">Pick a video style — auto-selects everything</div>
  <div class="grid" id="themeGrid"></div>
</div>

<!-- CINEMATOGRAPHY -->
<div class="section">
  <div class="section-title">🎬 Camera Movement</div>
  <div class="grid" id="camGrid"></div>
</div>

<div class="section">
  <div class="section-title">📐 Shot Type</div>
  <div class="grid" id="shotGrid"></div>
</div>

<div class="section">
  <div class="section-title">💡 Lighting</div>
  <div class="grid" id="lightGrid"></div>
</div>

<div class="section">
  <div class="section-title">🔊 Audio</div>
  <div class="grid" id="audioGrid"></div>
</div>

<!-- PARAMS -->
<div class="section">
  <div class="section-title">⚙️ Video Settings</div>
  <div class="param-row">
    <div class="param-group">
      <label>Duration</label>
      <select id="duration">
        <option value="4 seconds">4 seconds</option>
        <option value="6 seconds" selected>6 seconds</option>
        <option value="8 seconds">8 seconds</option>
      </select>
    </div>
    <div class="param-group">
      <label>Resolution</label>
      <select id="resolution">
        <option value="720p">720p</option>
        <option value="1080p" selected>1080p</option>
      </select>
    </div>
    <div class="param-group">
      <label>Aspect Ratio</label>
      <select id="aspect">
        <option value="16:9" selected>16:9 (YouTube/Wide)</option>
        <option value="9:16">9:16 (TikTok/Shorts)</option>
        <option value="1:1">1:1 (Square)</option>
        <option value="4:3">4:3 (Classic)</option>
        <option value="21:9">21:9 (Ultrawide)</option>
      </select>
    </div>
  </div>
</div>

<div class="prompt-area">
  <div class="prompt-box" id="promptDisplay">Select options above to build your video prompt...</div>
  <div class="btn-row">
    <button class="btn btn-primary" onclick="copyPrompt()">📋 Copy Prompt</button>
    <button class="btn btn-secondary" onclick="resetAll()">↺ Reset</button>
  </div>
</div>

<script>
// Veo 3.1 formula: [Cinematography] + [Subject] + [Action] + [Context] + [Style & Ambiance]

const camOptions = [
  {id:'static', name:'Static / Locked', desc:'Camera still, no movement, tripod', kw:'static locked-off camera shot'},
  {id:'pan', name:'Pan Left/Right', desc:'Camera rotates horizontally', kw:'slow panning shot moving across the scene'},
  {id:'tilt', name:'Tilt Up/Down', desc:'Camera tilts vertically', kw:'tilting shot moving upward revealing the scene'},
  {id:'track', name:'Tracking Shot', desc:'Camera moves alongside subject', kw:'tracking shot following the subject'},
  {id:'dolly', name:'Dolly In/Out', desc:'Camera physically moves toward or away', kw:'dolly shot pushing in toward the subject'},
  {id:'crane', name:'Crane / Boom', desc:'Camera rises or lowers dramatically', kw:'crane shot starting low and ascending high above'},
  {id:'drone', name:'Drone Flyover', desc:'Aerial sweeping movement', kw:'drone aerial flyover shot sweeping across'},
  {id:'handheld', name:'Handheld / Shaky', desc:'Unstable, documentary feel', kw:'handheld camera, slightly shaky, documentary style'},
  {id:'gimbal', name:'Gimbal / Smooth', desc:'Ultra smooth, floaty movement', kw:'smooth gimbal shot, fluid camera movement'},
  {id:'arc', name:'Arc / Circle', desc:'Camera moves around subject 180/360', kw:'smooth arc shot circling around the subject'},
  {id:'whip', name:'Whip Pan', desc:'Fast sudden camera spin', kw:'whip pan fast camera rotation transition'},
  {id:'slider', name:'Slider Dolly', desc:'Smooth lateral movement', kw:'slider dolly smooth lateral tracking shot'},
];

const shotOptions = [
  {id:'ecu', name:'Extreme Close-Up', desc:'Eyes, hands, tiny detail', kw:'extreme close-up shot'},
  {id:'closeup', name:'Close-Up', desc:'Face fills frame, emotion', kw:'close-up shot'},
  {id:'medium', name:'Medium Shot', desc:'Waist up, body language + face', kw:'medium shot'},
  {id:'full', name:'Full Body', desc:'Whole person, environment visible', kw:'full body shot'},
  {id:'wide', name:'Wide Shot', desc:'Subject + surroundings', kw:'wide shot'},
  {id:'extreme-wide', name:'Extreme Wide', desc:'Tiny subject in large landscape', kw:'extreme wide shot establishing'},
  {id:'over-shoulder', name:'Over-Shoulder', desc:'Over shoulder, conversation', kw:'over the shoulder shot'},
  {id:'pov', name:'POV', desc:'Subjects point of view', kw:'point of view shot'},
  {id:'two-shot', name:'Two Shot', desc:'Two subjects in frame', kw:'two shot with both subjects'},
  {id:'insert', name:'Insert Shot', desc:'Detail shot of object', kw:'insert shot detail of'},
];

const lightOptions = [
  {id:'golden', name:'Golden Hour', desc:'Warm orange, long shadows', kw:'golden hour lighting, warm sunlight'},
  {id:'blue', name:'Blue Hour', desc:'Cool twilight, moody', kw:'blue hour twilight, cool ambient light'},
  {id:'chiaro', name:'Chiaroscuro', desc:'Extreme contrast, dark shadows', kw:'chiaroscuro lighting, dramatic shadows'},
  {id:'soft', name:'Soft Diffused', desc:'Even, soft, no harsh shadows', kw:'soft diffused lighting, gentle shadows'},
  {id:'neon', name:'Neon / Cyberpunk', desc:'Colored lights, night urban', kw:'neon lighting, colorful city lights at night'},
  {id:'practical', name:'Practical Lights', desc:'Lamps, candles, in-frame sources', kw:'practical lighting from lamps and candles'},
  {id:'hard', name:'Hard Sunlight', desc:'Direct sun, sharp shadows', kw:'harsh direct sunlight, strong shadows'},
  {id:'studio', name:'Studio / Softbox', desc:'Clean even studio light', kw:'studio softbox lighting, clean professional'},
  {id:'mixed', name:'Mixed Color Temp', desc:'Warm + cold light contrast', kw:'mixed color temperature lighting, warm and cool contrast'},
  {id:'natural', name:'Natural Window', desc:'Window light, soft ambient', kw:'natural window light, soft ambient fill'},
  {id:'silhouette', name:'Silhouette', desc:'Subject dark, bright behind', kw:'silhouette against bright background'},
  {id:'practical-neon', name:'Street / Neon', desc:'Urban night, signs, glow', kw:'urban night lighting from street signs and neon'},
];

const audioOptions = [
  {id:'dialogue', name:'Dialogue', desc:'People speaking, lipsync', kw:'synchronized dialogue, characters speaking'},
  {id:'narration', name:'Narration / VO', desc:'Voice over, narrator', kw:'voice over narration'},
  {id:'sfx', name:'Sound Effects', desc:'Specific sounds, Foley', kw:'SFX with precise sound effects'},
  {id:'ambient', name:'Ambient Nature', desc:'Wind, birds, water, forest', kw:'ambient nature sounds, wind and birds'},
  {id:'ambient-city', name:'Ambient City', desc:'Traffic, people, city hum', kw:'ambient city sounds, distant traffic'},
  {id:'music', name:'Background Music', desc:'Mood-setting soundtrack', kw:'background music setting the mood'},
  {id:'silence', name:'Silent / Minimal', desc:'No audio, quiet tension', kw:'silent scene, minimal ambient sound'},
  {id:'tense', name:'Tense Atmosphere', desc:'Droning, building tension', kw:'tense atmospheric sound design, low drone'},
];

const themes = [
  {id:'product', emoji:'📦', name:'Product Demo', desc:'Smooth cinematic product showcase', cam:'gimbal', shot:'medium', light:'studio', audio:'music', kw:'smooth cinematic product showcase, slow rotation revealing details, clean studio lighting, premium product photography style'},
  {id:'short-film', emoji:'🎬', name:'Short Film Scene', desc:'Dramatic narrative scene', cam:'dolly', shot:'wide', light:'chiaro', audio:'dialogue', kw:'cinematic short film scene, dramatic dolly shot, moody chiaroscuro lighting, characters speaking'},
  {id:'tutorial', emoji:'📺', name:'Tutorial / How-To', desc:'Clean instructional video', cam:'static', shot:'medium', light:'studio', audio:'narration', kw:'clean instructional video, static camera, bright even lighting, voice over narration, professional'},
  {id:'broll', emoji:'🎥', name:'Cinematic B-Roll', desc:'Atmospheric filler footage', cam:'crane', shot:'extreme-wide', light:'golden', audio:'ambient', kw:'cinematic b-roll footage, crane shot, golden hour, ambient sound, atmospheric slow motion'},
  {id:'interview', emoji:'🎙️', name:'Interview / Talking Head', desc:'Professional interview setup', cam:'static', shot:'closeup', light:'soft', audio:'dialogue', kw:'professional interview shot, static camera, soft key light, clean background, dialogue'},
  {id:'travel', emoji:'✈️', name:'Travel / Vlog', desc:'Wanderlust travel footage', cam:'gimbal', shot:'wide', light:'golden', audio:'music', kw:'travel videography, smooth gimbal tracking, golden hour, ambient music, wanderlust'},
  {id:'action', emoji:'💥', name:'Action / Chase', desc:'Fast-paced dynamic sequence', cam:'handheld', shot:'medium', light:'hard', audio:'tense', kw:'fast paced action sequence, handheld camera, harsh sunlight, tense atmosphere, dynamic'},
  {id:'drone-scene', emoji:'🚁', name:'Drone / Aerial', desc:'Landscape from above', cam:'drone', shot:'extreme-wide', light:'golden', audio:'ambient', kw:'drone aerial flyover, golden hour landscape, ambient wind, vast sweeping view'},
  {id:'commercial', emoji:'📺', name:'TV Commercial', desc:'A 30-second ad spot', cam:'crane', shot:'medium', light:'studio', audio:'narration', kw:'television commercial, crane shot revealing product, studio lighting, voice over'},
  {id:'music-video', emoji:'🎵', name:'Music Video', desc:'Stylized artistic visuals', cam:'whip', shot:'closeup', light:'neon', audio:'music', kw:'music video style, whip pans, neon colorful lighting, fast cuts, artistic'},
  {id:'timelapse', emoji:'⏱️', name:'Timelapse', desc:'Fast forward scene', cam:'static', shot:'extreme-wide', light:'golden', audio:'ambient', kw:'timelapse, static camera, clouds moving fast, golden hour to night transition'},
  {id:'slomo', emoji:'🐝', name:'Slow Motion', desc:'Slowed down for drama', cam:'gimbal', shot:'closeup', light:'soft', audio:'ambient', kw:'slow motion, smooth gimbal, soft diffused light, dreamy atmosphere'},
  {id:'horror', emoji:'👻', name:'Horror / Suspense', desc:'Creepy tense atmosphere', cam:'handheld', shot:'closeup', light:'chiaro', audio:'tense', kw:'horror scene, handheld shaking, chiaroscuro shadows, tense atmospheric sound'},
  {id:'real-estate', emoji:'🏠', name:'Real Estate Tour', desc:'Property walkthrough', cam:'gimbal', shot:'wide', light:'soft', audio:'music', kw:'real estate walkthrough, smooth wide shot, natural soft light, bright airy, background music'},
  {id:'event', emoji:'🎉', name:'Event / Wedding', desc:'Live moment capture', cam:'handheld', shot:'medium', light:'golden', audio:'ambient', kw:'event videography, candid handheld, golden hour outdoor, ambient crowd sounds, natural'},
  {id:'tech-review', emoji:'💻', name:'Tech Review', desc:'Product hands-on review', cam:'dolly', shot:'closeup', light:'studio', audio:'narration', kw:'tech review video, dolly push in on product, clean studio light, voice over review style'},
];

const selections = { cam: null, shot: null, light: null, audio: null };

function renderGrid(id, options, cat) {
  const grid = document.getElementById(id);
  grid.innerHTML = '';
  options.forEach(o => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.value = o.id;
    card.onclick = () => selectOption(cat, o.id);
    const label = document.createElement('div');
    label.className = 'label'; label.textContent = o.name;
    const desc = document.createElement('div');
    desc.className = 'desc'; desc.textContent = o.desc;
    card.appendChild(label); card.appendChild(desc);
    grid.appendChild(card);
  });
}

function renderThemes() {
  const grid = document.getElementById('themeGrid');
  themes.forEach(t => {
    const card = document.createElement('div');
    card.className = 'theme-card';
    card.onclick = () => applyTheme(t.id);
    card.innerHTML = `
      <div class="emoji">${t.emoji}</div>
      <div class="name">${t.name}</div>
      <div class="desc">${t.desc}</div>
      <div class="tags">
        <span class="tag">${t.cam}</span>
        <span class="tag">${t.shot}</span>
        <span class="tag">${t.light}</span>
        <span class="tag">${t.audio}</span>
      </div>
    `;
    grid.appendChild(card);
  });
}

function applyTheme(themeId) {
  const t = themes.find(x => x.id === themeId);
  if (!t) return;
  selections.cam = t.cam;
  selections.shot = t.shot;
  selections.light = t.light;
  selections.audio = t.audio;
  
  ['cam','shot','light','audio'].forEach(cat => {
    document.querySelectorAll(`#${cat}Grid .card`).forEach(c => {
      c.classList.toggle('selected', c.dataset.value === selections[cat]);
    });
  });
  
  document.querySelectorAll('.theme-card').forEach(c => c.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
  
  const suggestions = {
    'product':'a sleek smartphone rotating on a pedestal',
    'short-film':'a detective entering a dimly lit room',
    'tutorial':'a person demonstrating how to use a tool',
    'broll':'steam rising from a fresh cup of coffee',
    'interview':'a professional looking at camera and speaking',
    'travel':'a person walking through a vibrant marketplace',
    'action':'a person running through a narrow alley',
    'drone-scene':'a coastline with waves crashing on cliffs',
    'commercial':'a family smiling around a dinner table',
    'music-video':'a singer performing on a neon-lit stage',
    'timelapse':'a busy city intersection from above',
    'slomo':'water droplets falling into a glass',
    'horror':'a dark figure standing at the end of a hallway',
    'real-estate':'a bright modern living room with large windows',
    'event':'a couple dancing at sunset',
    'tech-review':'hands unboxing and examining a new device',
  };
  if (suggestions[themeId]) document.getElementById('subject').value = suggestions[themeId];
  updatePrompt();
}

function selectOption(cat, val) {
  selections[cat] = val;
  document.querySelectorAll(`#${cat}Grid .card`).forEach(c => {
    c.classList.toggle('selected', c.dataset.value === val);
  });
  document.querySelectorAll('.theme-card').forEach(c => c.classList.remove('selected'));
  updatePrompt();
}

function getOpt(id) {
  return [...camOptions, ...shotOptions, ...lightOptions, ...audioOptions].find(o => o.id === id);
}

function updatePrompt() {
  const subj = document.getElementById('subject').value || 'a scene';
  const dur = document.getElementById('duration').value;
  const res = document.getElementById('resolution').value;
  const asp = document.getElementById('aspect').value;
  
  const cam = getOpt(selections.cam);
  const shot = getOpt(selections.shot);
  const light = getOpt(selections.light);
  const audio = getOpt(selections.audio);
  
  const els = [];
  if (cam) els.push(`<span class="hl">[${cam.kw}]</span>`);
  if (shot) els.push(`<span class="hl2">[${shot.kw}]</span>`);
  els.push(`<b>${subj}</b>`);
  if (light) els.push(`<span class="hl3">[${light.kw}]</span>`);
  if (audio) els.push(`<span class="hl4">[${audio.kw}]</span>`);
  els.push(`[${dur}, ${res}, ${asp}, cinematic quality]`);
  
  const p = els.join(' ');
  document.getElementById('promptDisplay').innerHTML = p || 'Select options above to build your prompt...';
  document.getElementById('promptDisplay').dataset.plaintext = els.map(x => x.replace(/<[^>]+>/g,'')).join(' ');
}

function copyPrompt() {
  const text = document.getElementById('promptDisplay').dataset.plaintext || document.getElementById('promptDisplay').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.btn-primary');
    btn.textContent = '✅ Copied!';
    setTimeout(() => btn.textContent = '📋 Copy Prompt', 2000);
  });
}

function resetAll() {
  ['cam','shot','light','audio'].forEach(cat => {
    selections[cat] = null;
    document.querySelectorAll(`#${cat}Grid .card`).forEach(c => c.classList.remove('selected'));
  });
  document.querySelectorAll('.theme-card').forEach(c => c.classList.remove('selected'));
  updatePrompt();
}

document.querySelectorAll('.param-row select').forEach(s => s.onchange = updatePrompt);
document.getElementById('subject').oninput = updatePrompt;

renderThemes();
renderGrid('camGrid', camOptions, 'cam');
renderGrid('shotGrid', shotOptions, 'shot');
renderGrid('lightGrid', lightOptions, 'light');
renderGrid('audioGrid', audioOptions, 'audio');
</script>
</body>
</html>
