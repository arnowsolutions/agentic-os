version: "3.8"

services:
  agentic-os:
    build:
      context: .
      dockerfile: Dockerfile
    image: agentic-os:latest
    container_name: agentic-os
    restart: unless-stopped
    ports:
      - "8090:8090"
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - PORT=8090
    volumes:
      # Persist logs and mutable data outside the container.
      - ./logs:/app/logs
      - ./data:/app/data
      - ./knowledge-base:/app/knowledge-base
      - ./brain:/app/brain
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/vapi/status', timeout=4)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Optional: Prometheus sidecar. Uncomment when METRICS_PORT is configured.
  # prometheus:
  #   image: prom/prometheus:latest
  #   container_name: agentic-os-prometheus
  #   restart: unless-stopped
